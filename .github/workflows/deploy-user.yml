name: Deploy User API to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'NDIS.User.API/**'
      - '.github/workflows/deploy-user.yml'
  workflow_dispatch:

env:
  PROJECT_PATH: 'NDIS.User.API/NDIS.User.API.csproj'
  PUBLISH_PATH: './publish-user'
  DOTNET_VERSION: '8.0.x'
  AZURE_WEBAPP_NAME: 'ndis-user-api-1018'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_PATH }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_USER }}
          package: ${{ env.PUBLISH_PATH }}