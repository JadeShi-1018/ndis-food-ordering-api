<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 18px Arial, sans-serif; fill: #111827; }
      .body { font: 400 15px Arial, sans-serif; fill: #374151; }
      .small { font: 400 14px Arial, sans-serif; fill: #6b7280; }
      .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 20; ry: 20; }
      .accent { fill: #0f766e; stroke: #0f766e; stroke-width: 2; rx: 20; ry: 20; }
      .accentText { font: 700 20px Arial, sans-serif; fill: #ffffff; }
      .line { stroke: #64748b; stroke-width: 3; fill: none; }
      .dashed { stroke: #94a3b8; stroke-width: 3; fill: none; stroke-dasharray: 9 8; }
      .bg { fill: #f8fafc; }
      .pill { fill: #ecfeff; stroke: #99f6e4; stroke-width: 1.5; rx: 14; ry: 14; }
      .pillText { font: 700 14px Arial, sans-serif; fill: #0f766e; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowLight" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1400" height="900" class="bg"/>

  <text x="70" y="70" class="title">NDIS Care Platform — Architecture Overview</text>
  <text x="70" y="105" class="subtitle">Microservices-based meal ordering workflow with Stripe, RabbitMQ / MassTransit, and the Outbox Pattern</text>

  <!-- Frontend -->
  <rect x="90" y="160" width="280" height="110" class="accent"/>
  <text x="230" y="210" text-anchor="middle" class="accentText">Frontend</text>
  <text x="230" y="242" text-anchor="middle" class="accentText" style="font-size:16px;">Next.js Web App</text>

  <!-- Services row -->
  <rect x="470" y="135" width="220" height="120" class="box"/>
  <text x="580" y="175" text-anchor="middle" class="label">User Service</text>
  <text x="580" y="205" text-anchor="middle" class="body">Registration</text>
  <text x="580" y="228" text-anchor="middle" class="body">Login / Identity</text>

  <rect x="730" y="135" width="220" height="120" class="box"/>
  <text x="840" y="175" text-anchor="middle" class="label">Order Service</text>
  <text x="840" y="205" text-anchor="middle" class="body">Create Order</text>
  <text x="840" y="228" text-anchor="middle" class="body">Order Lifecycle</text>

  <rect x="990" y="135" width="220" height="120" class="box"/>
  <text x="1100" y="175" text-anchor="middle" class="label">Provider Service</text>
  <text x="1100" y="205" text-anchor="middle" class="body">Provider Listings</text>
  <text x="1100" y="228" text-anchor="middle" class="body">Service Data</text>

  <rect x="730" y="310" width="220" height="120" class="box"/>
  <text x="840" y="350" text-anchor="middle" class="label">Payment Service</text>
  <text x="840" y="380" text-anchor="middle" class="body">Stripe Integration</text>
  <text x="840" y="403" text-anchor="middle" class="body">Payment State</text>

  <rect x="1030" y="315" width="170" height="100" class="box"/>
  <text x="1115" y="355" text-anchor="middle" class="label">Stripe</text>
  <text x="1115" y="385" text-anchor="middle" class="body">Sandbox Payments</text>

  <!-- DBs -->
  <rect x="445" y="520" width="240" height="120" class="box"/>
  <text x="565" y="560" text-anchor="middle" class="label">User DB</text>
  <text x="565" y="590" text-anchor="middle" class="body">User data</text>
  <text x="565" y="613" text-anchor="middle" class="body">Auth-related records</text>

  <rect x="710" y="520" width="260" height="120" class="box"/>
  <text x="840" y="560" text-anchor="middle" class="label">Order DB</text>
  <text x="840" y="590" text-anchor="middle" class="body">Orders</text>
  <text x="840" y="613" text-anchor="middle" class="body">Order status updates</text>

  <rect x="995" y="520" width="260" height="120" class="box"/>
  <text x="1125" y="560" text-anchor="middle" class="label">Payment DB + Outbox</text>
  <text x="1125" y="590" text-anchor="middle" class="body">Payment records</text>
  <text x="1125" y="613" text-anchor="middle" class="body">Pending integration events</text>

  <!-- MQ -->
  <rect x="960" y="700" width="330" height="110" class="accent"/>
  <text x="1125" y="742" text-anchor="middle" class="accentText">RabbitMQ / MassTransit</text>
  <text x="1125" y="776" text-anchor="middle" class="accentText" style="font-size:16px;">Asynchronous Event Delivery</text>

  <!-- Workflow pills -->
  <rect x="90" y="350" width="130" height="40" class="pill"/>
  <text x="155" y="375" text-anchor="middle" class="pillText">Create Order</text>

  <rect x="250" y="350" width="170" height="40" class="pill"/>
  <text x="335" y="375" text-anchor="middle" class="pillText">PendingPayment</text>

  <rect x="90" y="410" width="185" height="40" class="pill"/>
  <text x="182" y="435" text-anchor="middle" class="pillText">Stripe Payment Success</text>

  <rect x="305" y="410" width="190" height="40" class="pill"/>
  <text x="400" y="435" text-anchor="middle" class="pillText">Write Event to Outbox</text>

  <rect x="525" y="410" width="160" height="40" class="pill"/>
  <text x="605" y="435" text-anchor="middle" class="pillText">Publish Event</text>

  <rect x="90" y="470" width="190" height="40" class="pill"/>
  <text x="185" y="495" text-anchor="middle" class="pillText">Consume Payment Event</text>

  <rect x="310" y="470" width="195" height="40" class="pill"/>
  <text x="407" y="495" text-anchor="middle" class="pillText">Update Order Status</text>

  <!-- Infra note -->
  <rect x="70" y="700" width="770" height="110" class="box"/>
  <text x="100" y="740" class="label">Deployment</text>
  <text x="100" y="775" class="body">Frontend hosted on Azure Static Web Apps</text>
  <text x="100" y="800" class="body">Backend APIs and SQL infrastructure deployed on Azure</text>

  <!-- Arrows -->
  <path d="M370 215 L455 195" class="line" marker-end="url(#arrow)"/>
  <path d="M370 215 L715 195" class="line" marker-end="url(#arrow)"/>
  <path d="M370 215 L975 195" class="line" marker-end="url(#arrow)"/>

  <path d="M840 255 L840 300" class="line" marker-end="url(#arrow)"/>
  <path d="M950 370 L1020 365" class="line" marker-end="url(#arrow)"/>

  <path d="M580 255 L565 510" class="line" marker-end="url(#arrow)"/>
  <path d="M840 255 L840 510" class="line" marker-end="url(#arrow)"/>
  <path d="M840 430 L840 510" class="line" marker-end="url(#arrow)"/>
  <path d="M1100 255 L1125 510" class="line" marker-end="url(#arrow)"/>

  <path d="M1125 640 L1125 690" class="line" marker-end="url(#arrow)"/>
  <path d="M960 755 L860 755 L860 640" class="dashed" marker-end="url(#arrowLight)"/>

  <!-- Legend -->
  <rect x="1180" y="60" width="170" height="70" class="box"/>
  <rect x="1195" y="78" width="24" height="18" class="accent"/>
  <text x="1230" y="92" class="small">Active workflow / platform</text>
  <rect x="1195" y="103" width="24" height="18" class="box"/>
  <text x="1230" y="117" class="small">Services / data stores</text>
</svg>
